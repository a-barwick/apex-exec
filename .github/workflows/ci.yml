name: CI

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * 1-5"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  RUST_VERSION: 1.88.0

jobs:
  quality:
    name: Rust quality
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: quality

      - name: Validate workflow syntax and expressions
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Set up uv for workflow security linting
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          version: 0.7.12
          enable-cache: false

      - name: Audit workflow security boundaries
        run: uvx --from zizmor==1.27.0 zizmor .github

      - name: Verify formatting
        run: cargo fmt --check

      - name: Lint all targets
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Build API documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --locked --no-deps

      - name: Verify distributable crate
        run: cargo package --locked

  tests:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: tests

      - name: Run unit, integration, CLI, and documentation tests
        run: cargo test --locked

  apex-regression:
    name: Complex Apex regression suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: apex-regression

      - name: Build optimized runtime
        run: cargo build --locked --release

      - name: Protect the accepted real-world lexer frontier
        run: cargo test --locked --test north_star lexes_json_parse -- --ignored --exact

      - name: Run realistic Apex and SFDX projects
        env:
          APEX_EXEC_BIN: ${{ github.workspace }}/target/release/apex-exec
          CI_ARTIFACT_DIR: ${{ github.workspace }}/artifacts/apex-regression
        run: .github/scripts/run-apex-regression.sh

      - name: Upload Apex execution logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: apex-regression-logs
          path: artifacts/apex-regression/
          if-no-files-found: error
          retention-days: 14

  enterprise-ci:
    name: Hermetic CI (${{ matrix.label }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: milestone14-project
            label: M14 shard 1/2
            shard: 0
            total: 2
          - project: milestone14-project
            label: M14 shard 2/2
            shard: 1
            total: 2
          - project: milestone15-project
            label: M15 release gate
            shard: 0
            total: 1
    steps:
      - name: Check out complete history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: enterprise-ci-${{ matrix.project }}-${{ matrix.shard }}

      - name: Build optimized runtime
        run: cargo build --locked --release

      - name: Collect changed paths
        shell: bash
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          MERGE_BASE_SHA: ${{ github.event.merge_group.base_sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          base_sha="${PR_BASE_SHA:-${MERGE_BASE_SHA:-${PUSH_BEFORE_SHA:-}}}"
          if [[ -n "${base_sha}" && ! "${base_sha}" =~ ^0+$ ]]; then
            git diff --name-only "${base_sha}" HEAD > apex-exec-changed.txt
          else
            git ls-files > apex-exec-changed.txt
          fi
          echo "Changed-path input:"
          sed -n '1,200p' apex-exec-changed.txt

      - name: Restore content-addressed Apex results
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .ci-cache/apex-exec
          key: apex-results-${{ matrix.project }}-${{ matrix.shard }}-${{ github.sha }}

      - name: Run impacted Apex tests and policy gates
        run: >-
          target/release/apex-exec ci run
          examples/${{ matrix.project }}/apex-exec-ci.json
          --changed-list apex-exec-changed.txt
          --cache-dir .ci-cache/apex-exec
          --shard ${{ matrix.shard }}/${{ matrix.total }}

      - name: Prove deterministic artifact replay
        run: >-
          target/release/apex-exec ci run
          examples/${{ matrix.project }}/apex-exec-ci.json
          --changed-list apex-exec-changed.txt
          --cache-dir .ci-cache/apex-exec
          --shard ${{ matrix.shard }}/${{ matrix.total }}
          --replay

      - name: Upload JUnit, Cobertura, and SARIF reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: enterprise-ci-${{ matrix.project }}-${{ matrix.shard }}
          path: examples/${{ matrix.project }}/artifacts/${{ matrix.shard }}/
          if-no-files-found: warn
          retention-days: 14

      - name: Publish source-mapped diagnostics
        if: >-
          always() &&
          hashFiles(format(
            'examples/{0}/artifacts/{1}/results.sarif',
            matrix.project,
            matrix.shard
          )) != '' &&
          (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.fork == false) &&
          github.actor != 'dependabot[bot]'
        uses: github/codeql-action/upload-sarif@ddf5ce7296213f5548c91e2dd19df2d77d2b2d66 # v3
        with:
          sarif_file: examples/${{ matrix.project }}/artifacts/${{ matrix.shard }}/results.sarif
          category: apex-exec/${{ matrix.project }}/shard-${{ matrix.shard }}

  required:
    name: Required CI gate
    if: always()
    needs:
      - quality
      - tests
      - apex-regression
      - enterprise-ci
    runs-on: ubuntu-latest
    steps:
      - name: Require every confidence layer
        shell: bash
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          TEST_RESULT: ${{ needs.tests.result }}
          APEX_RESULT: ${{ needs.apex-regression.result }}
          ENTERPRISE_RESULT: ${{ needs.enterprise-ci.result }}
        run: |
          set -euo pipefail
          for result in \
            "${QUALITY_RESULT}" \
            "${TEST_RESULT}" \
            "${APEX_RESULT}" \
            "${ENTERPRISE_RESULT}"
          do
            if [[ "${result}" != "success" ]]; then
              echo "A required CI layer finished with: ${result}" >&2
              exit 1
            fi
          done
          echo "All required CI confidence layers passed."
