name: Set up Rust
description: Install the pinned project toolchain and restore Cargo caches.

inputs:
  cache-key:
    description: Job-specific cache partition.
    required: true

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      shell: bash
      run: |
        set -euo pipefail
        rustup toolchain install "${RUST_VERSION}" \
          --profile minimal \
          --component clippy \
          --component rustfmt
        rustup override set "${RUST_VERSION}"

    - name: Restore Cargo cache
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          target
        key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ inputs.cache-key }}-${{ hashFiles('Cargo.lock') }}
        restore-keys: |
          cargo-${{ runner.os }}-${{ runner.arch }}-${{ inputs.cache-key }}-
          cargo-${{ runner.os }}-${{ runner.arch }}-
